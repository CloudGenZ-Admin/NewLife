# https://github.com/firebase/firebase-tools

name: Deploy to Firebase
on:
  push:
    branches:
      - dev
      - stage

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "VITE_WC_URL=${{ secrets.VITE_WC_URL }}" >> .env
          echo "VITE_WC_CONSUMER_KEY=${{ secrets.VITE_WC_CONSUMER_KEY }}" >> .env
          echo "VITE_WC_CONSUMER_SECRET=${{ secrets.VITE_WC_CONSUMER_SECRET }}" >> .env
          echo "VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}" >> .env
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env
      
      - name: Install & Build
        run: |
          npm ci
          npm run build
      
      - name: Deploy to Dev
        if: github.ref == 'refs/heads/dev'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEWLIFE_CLOUDGENZ }}'
          target: dev-site
          channelId: live

      - name: Deploy to Stage
        if: github.ref == 'refs/heads/stage'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEWLIFE_CLOUDGENZ }}'
          target: stage-site
          channelId: live
